# This workflow builds the React app and deploys it to GitHub Pages.
# It is triggered on pushes to the main branch and can also be run manually.
name: Deploy to GitHub Pages

# For more information on GitHub Pages deployment, see:
# https://docs.github.com/en/pages/getting-started-with-github-pages/creating-a
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions are required to deploy to GitHub Pages. For more information, see:
# https://docs.github.com/en/actions/deployment/deploying-to-github-pages#permissions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: SPA fallback for React Router
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
